services:
  order_db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_db
    ports:
      - "54321:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 1s
      timeout: 5s
      retries: 10

  payment_db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "54322:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 1s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:management
    user: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
 
    healthcheck:
      test: ["CMD", "rabbitmqctl", "await_startup"]
      interval: 1s
      timeout: 5s
      retries: 15

  order:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      order_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      payment_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy 

  gateway:
    build:
      context: .
      dockerfile: APIGateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - payment
      - order



  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    ports:
      - "8083:8080"
    #environment:
      #- ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - gateway